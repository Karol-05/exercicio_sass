<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Aroma</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="container">
        <h1>Café Aroma</h1>
        <nav>
            <ul class="menu">
                <li><a href="#">Início</a></li>
                <li><a href="#">Cardápio</a></li>
            </ul>
        </nav>
    </div>
</header>

<section>
    <div class="container">
        <h2>Bebidas em destaque</h2>

        <ul class="products">
            <li class="product-item">
                <img src="https://cdn.pixabay.com/photo/2018/01/31/09/57/coffee-3120750_1280.jpg">
                <h3>Cappuccino</h3>
                <p>Café cremoso com leite vaporizado.</p>
                <a href="#" class="product-button">Ver detalhes</a>
            </li>

            <li class="product-item">
                <img src="https://cdn.pixabay.com/photo/2018/01/31/09/58/coffee-3120757_1280.jpg">
                <h3>Mocha</h3>
                <p>Café com chocolate e espuma.</p>
                <a href="#" class="product-button">Ver detalhes</a>
            </li>

            <li class="product-item">
                <img src="https://cdn.pixabay.com/photo/2020/03/13/04/01/breakfast-on-board-of-the-iron-4926867_1280.jpg">
                <h3>Latte</h3>
                <p>Leve e suave para qualquer hora.</p>
                <a href="#" class="product-button">Ver detalhes</a>
            </li>
        </ul>
    </div>
</section>

</body>
</html>
